front:
  text: 釋教最上乘秘密藏陁羅尼集序俊字号上都大安國寺傳密教超悟大師賜紫三藏沙門行琳述陁羅尼者揔持之梵稱也開佛心之秘藏示聖證之樞由至理極譚上乘宗要秘中之秘印三藏以導教機玄乃復玄加聲字而明法理弘旨普光之妙體垂密語以覆宣將通常寂之靈功依真言而顯唱現意生之悲幻啟頓悟之菩提金剛一乘甚深微細超言文之實智霈教令而普應群機離形色之常身奮調伏而大興化相斯者諸佛若捨加持之力十地菩尚非其境界況生死中人豈得聞乎矚萬法交紛悟之者無性聖智妙邃契之者無心故至人以無心之深慧契無性之真空根境兩冥情緣俱寂豈容名相於其閒哉但為含靈迷自三業不了唯心妄惑昏緾汩沒生死故聖人以憫歎起同體悲心開方便門示真常路大事因緣攝生利物觀乎無為而體本寂然有作乃神功頗測皆難思之力也是以善逝垂㩲應真覺樹智越有空之表身分百億之方圓萬德以福勞生演一實而拔情品固得道洽千靈悲沾九有法開頓漸齊登解脫之鄉教被根冝盡達無為之旨初談鹿菀韜辯鶴林慈化有緣導利無極擢塵迷於見海等詣圓成引稚子以三車咸臻樂果運悲智而不息窮劫際而弘深断截苦源偉哉調御雖則教演多途宗分唯二顯之與密統盡其源顯謂五性三乘俻諸經論密謂揔持秘藏陁羅尼門肇啟毗盧之尊廣示金剛智印授聽普賢之眾方開三密幽扃秘教斯興自茲而始尒後梵漢相傳昔今靡絕最上乘教不共圓宗五智㩲實之洪源瑜伽奧旨三密塵沙之大利遍照真筌然寄有為皆示無相必使來學知一切法本自不生見心明道偶乖其趣者尚枉勞於歲月故先哲云三乘教外別有持明雖復言同字同而功別義別原乎上通至覺下徹世天以大智如理而證以大悲如證而說為令學者獲真義利與我無異寔為理超名相假之以聲字波騰秘密之談智離去來寄之以摽圖雲布形儀之設故般若經云揔持無文字文字顯揔持由般若大悲故以文字說其由體也又云揔持猶妙藥亦如天甘露能療眾惑病服者常安樂其由利也儻能學蘊於心即凡夫三業成功德聚身同窣覩波語為妙法音性作光明藏五無閒之極舋應念雲銷十𢙣業之巨𠍴纔聞霧散發菩提心之覺慧啟悟法身住白月輪之等持圓周福智三密相應以菩提心住本尊觀一念瑜伽俄登上地證本無漏智性是知自心成就無得而得如實現前即於此生便作有苦邊際何勞進修多劫不歷僧祇獲法身者斯之謂歟其利大也難可名焉廓坦夷獨稱最勝三途人天之趣久溺漂沉二乘十地之流尚拘因果羽毛酸辛之軰須假教慈邪迷妄執之徒冝滂法雨大要乎拯汲淺凡梯𮎃苦類遂令塵飄影爍神翫天宮土散水沾識分𢙣趣滅七返之重隟壽命增延蠲積世之昏愚聞持辯慧浣滌意垢披豁情疑誠哉迅途讚揚莫及自金仁應夢大教西來貝雖譯於真文密藏未宣於修旨洎我大唐開元𥝝中厥有釋迦善無畏三藏金剛智三藏不空三藏三大阿闍梨繼至長安方始巨陳密理備搌修儀秘教大布於支那壇像遍摸於僧宇師資傳習代無閒焉行琳不揆踈昧幸早宗師勉憚澄襟討探積歲住法身之止觀入佛乘置明字以融心超昇性地喜躬寶所欣踐玄涯空申發行之勤寧滿悉地之志思有情具含覺性秖弱瀑流悲熱惱常困四生難施雷雨聖言可閔誠為痛傷況佛日沉暉像教荒墜懸絲殘響孰幾擔護每慙薄祐虛會明時奉持之願雖深崇紹之能匪立覿彼顯教代有英才省我密宗緇流少習益以𭁿乱之後明藏星隳慮漸陵夷敢申微志乃詢諸舊譯搜驗眾經言多質略不契梵音今則揩切新文貴全印語希揔持之不墜誓密炬以長輝然彼方此方字別而唐音梵音聲同必使華竺韻齊遐言類通學者之脩逕達聖旨之幽蹤意盡明門卷成三十分品族以隔高卑約悲奮而階次第佛頂顯最尊奇特佛心示覺體玄深諸佛以福智果圓佛母表出生慈育菩悲行接物明王調伏難調聖天毒豐饒世主加威愛護諸經散說巧濟隨根內則芟裂惑疑外乃袪除障難增長福聚開發慧門成就神通堅固力勢者無比越陁羅尼也牋烈聖證之文寶積金言之利譬猶採瓌琦於瀛渚出珠璧於賢瓶所冀上報國恩敬酬佛德希寰海之清寧保皇圖於萬劫伏願見聞蒙益悉發覺心讀念居懷齊登樂果敢以傳諸同志期盡將來極導無邊但深感仰之至慙省寡聞聊申紀序時大唐𠃵寧五𥝝歲在戊午寄安順政太陽𨂷次大火望圓之日集畢
