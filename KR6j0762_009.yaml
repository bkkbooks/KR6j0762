body:
  text: 上都大安國寺傳密教超悟大師賜紫三藏沙門行琳集無垢淨光根本陀羅尼相輪橖中陀羅尼修造塔陀羅尼除蓋障菩說一切佛心陀羅尼輪橖及塔四周陀羅尼相輪中及旋繞陀羅尼智矩陀羅尼心陀羅尼隨心陀羅尼大般涅盤經摧魔大陀羅尼持世大陀羅尼心陀羅尼心陀羅尼隨心陀羅尼花聚陀羅尼勝幢臂印陀羅尼佛說一切諸法入無量門陀羅尼最勝無垢清淨光明根本陀羅尼曩莫颯跢颯多底毗藥二合一三𦴭三沒䭾引句置引南上引二跛哩秫䭾迦引也嚩無博反引枳唧多三囉二合底瑟恥二合跢引南上引四曩謨引婆去誐嚩帝五阿上弭跢引𢈔灑瀉怛他引多寫六唵七怛他引多秫第八阿引欲尾戍引䭾𩕳九僧去賀囉僧去賀囉十嚩怛他引多尾引哩也二合麼𥠖曩十一囉二合底僧去賀囉阿引欲十二娑麼二合囉娑麼二合囉十三嚩怛他引多三麼焰十四引地引地十五沒地也二合尾沒地也二合十六引䭾也引䭾也十七嚩怛嚩二合引南上引十八嚩播跛阿上嚩囉拏引尾秫第十九尾多麼攞麼攞婆去二十素沒䭾沒弟二十一戶嚕戶嚕二十二娑嚩二合引賀引二十三相輪橖中陀羅尼唵一嚩怛他引多尾補攞拽瑟置上二合二麼抳迦曩迦囉引惹引多三尾步史多拽瑟置上二合度嚕度嚕四三滿多尾路枳帝五娑囉娑囉六嚩播跛尾戍引䭾寧七引䭾𩕳八三引䭾𩕳九囉二合嚩囉拽瑟置二合上十嚩𭋸麼特嚩二合薺引十一嚕唧囉麼攞尾秫第十二吽引吽引十三娑嚩二合引賀引十四修造塔陀羅尼唵一嚩怛他引多麼攞尾戍引䭾寧二巘䭾尾𥠖三跛曩嚩𭋸四囉二合底僧去塞迦二合囉五怛他引多䭾引覩䭾𭋸六䭾囉䭾囉七散䭾囉散䭾囉八嚩怛他引多引地瑟恥二合帝九娑嚩二合引賀引十除蓋障菩說一切佛心陀羅尼曩謨婆去誐嚩旦曩嚩引曩嚩底引南上引一三𦴭三沒䭾句引置引曩𢈔多二設多娑賀娑囉二合三凝魚警反下同誐引曩你引嚩虜迦娑麼引南上引曩莫嚩𩕳引嚩囉拏尾色劒二合鼻引地怛嚩二合引也四唵五覩嚕覩嚕六嚩引嚩囉拏尾戍引䭾𩕳七嚩怛他引多阿引欲播引攞𩕳八尾補𥠖九捏寧逸反􅝝麼𥠖十嚩悉䭾曩莫塞訖㗚三合帝十一婆囉婆囉十二嚩怛嚩二合引嚩路枳𩕳十三吽引十四嚩𩕳引嚩囉拏尾色劒二合鼻十五嚩播引跛尾戍引䭾𩕳十六娑嚩二合引賀引十七輪橖及塔四周陀羅尼曩莫曩嚩引曩嚩底引南上引一怛他引多句引置引二凝同上上誐引曩你引嚩引虜迦引娑麼引南上引三唵引四尾補𥠖尾麼𥠖五囉二合嚩𭋸六爾曩嚩𭋸七娑囉娑囉八嚩怛他引多䭾引覩陛九底也二合引地瑟恥二合帝十娑嚩二合引賀引十阿上演覩部嚩𩕳十一娑嚩二合引賀引十二嚩去嚩引南上引十三阿引嚩引賀也弭十四沒䭾引地瑟姹二合引曩三麼十五娑嚩二合引賀引十六相輪中及旋繞陀羅尼曩莫曩嚩引曩嚩底引南上引一怛他引多句引置引曩𢈔多設多娑賀囉二合引二凝上同上誐曩你引嚩引虜迦娑麼引南上引三唵四普普物反􅛼普依字呼哩五左理𩕳六左理左攞曩唧𥠖七母𩕳母𩕳八戶哩惹楞上迦哩九娑嚩二合引賀引十智炬陀羅尼僧去也體町異反引南上一作屈入二合娜諾二作屈二合囉二合婆去引三度攞銘他入四羯剌他五一體町以反歎他鄧反娑六素囉𪘨七素囉娜八窣歎同上娑九一歎引同上娑十吠攞吠攞十一吠引攞引跛抳吠攞跛抳十二佐引嚕母㗚多二合𩕳十三阿引囉抳阿引囉十四迦引攞引播引抳迦攞播抳十五覩嚕度枲覩嚕度枲十六覩嚕覩魯度枲十七䭾引蘇底䭾蘇底十八䭾囉䭾囉十九地哩地哩二十度嚕度嚕二十一度引囉度引囉二十二迦引攞迦攞二十三他引娑他引娑二十四擬攞擬攞二十五擬引攞引跛也擬引攞跛也二十六度蘇度蘇二十七遜度遜蘇㵕反僕引二十八悉他素頞多二十九噎他蘇三十噎他引娑引播三十一逸乳自嚕反哩𭋸三十二弟蘇𭋸三十二迦囉迦囉三十三枳哩枳哩三十四矩嚕矩嚕三十五䓛俱律反􅝝麼䓛麼三十六羯麼羯麼三十七羯􅝝麼引跛抳羯麼跛抳三十八計虜計虜三十九計攞引播計攞播抳四十羯迦哩羯迦哩四十一邏引嚕母去四十二度嚕泥度嚕泥四十三摩賀引度嚕泥四十四迦囉迦囉四十五枳哩枳哩四十六矩嚕矩嚕四十七𩯫濁滯數反枲𩯫濁同上枲四十八度素度素四十九賀素賀素五十賀引娑引跛五十一娑嚩二合引賀引五十二怛你也二合他引五十三度曩置度曩置上五十四摩賀引度曩置上五十五素嚕素嚕五十六娑嚩二合引賀引五十七束訖攞二合尾戍引䭾𩕳五十八多囉多囉五十九娑嚩二合引賀引六十爾喻二合引底澀囉三合你引閇六十一覩嚕覩嚕六十二娑嚩二合引賀引六十三納麼二合麼引理𩕳六十四娑嚩二合引賀引六十五底也二合囉多沒地六十六戶嚕戶嚕六十七娑嚩二合引賀引六十八底也二合沒弟六十九底也二合引嚩路枳𩕳七十覩嚕覩嚕七十一娑嚩二合引賀引七十二䭾引囉沒地七十三阿囉二合底賀多沒第七十四祖嚕祖嚕七十五娑嚩二合引賀引七十六怛你也二合他七十七尾麼𥠖七十八尾麼攞引努麼帝七十九阿麼攞八十尾麼𥠖八十一三滿多道多𩕳八十二娑嚩二合引賀引八十三嚩麼攞引跛羯㗚灑二合抳八十四尾多捏寧逸反􅝝麼𥠖八十五𩕳娜引賀寧八十六阿曩嚩勢灑哩演二合多枳囉抳八十七嚩囉二合婆去尾𩕳㗚多二合寧八十八阿上囉二合娜引襪㗚多二合曩淡銘八十九三滿多引尾捏同上􅝙抱誐帝九十𩕳囉引室哩二合九十一𩕳囉引攞九十二嚩妬尾引唧沒㗚二合帝九十三嚩僧去舍引也跛𩕳引帝九十四尾多三步引帝九十五三滿多引地跛囉銘九十六阿上