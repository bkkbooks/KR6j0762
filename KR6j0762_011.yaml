body:
  text: 上都大安國寺傳密教超悟大師賜紫三藏沙門行琳集千臂千眼觀自在菩大悲根本陀羅尼千臂千眼觀自在菩大悲心中心陀羅尼大悲四十二臂九種心法滿願門儀軌聖觀自在大威德馬首明王陀羅尼馬首明王心陀羅尼馬首明王縛障陀羅尼馬首明王護淨陀羅尼馬首明王大心陀羅尼馬首明王小心陀羅尼馬首明王隨心陀羅尼馬首明王護身陀羅尼馬首明王忿怒心陀羅尼馬首明王法身陀羅尼馬首明王頭陀羅尼馬首明王牙陀羅尼馬首明王陀羅尼馬首明王祈雨陀羅尼馬首明王止雨陀羅尼二道聖觀自在菩三世最勝心陀羅尼三世最勝身陀羅尼聖觀自在一切蓮花部心陀羅尼一切蓮花部母心陀羅尼聖觀自在千臂千眼大悲身陀羅尼十一面觀自在菩陀羅尼聖觀自在菩千臂千眼千頭千足千舌大悲根本陀羅尼曩謨喇怛曩二合怛囉二合夜引也一曩莫阿去引哩也二合引嚩路枳帝濕嚩二合囉引也二引地怛嚩二合引也三摩賀引怛嚩二合引也四摩賀引迦嚕迦引也五摩賀引尾引囉引也六娑賀娑囉二合𢙣乞叉二合引也七娑賀娑囉二合試㗚灑二合引也八娑賀娑囉二合播娜引也九娑賀娑囉二合爾􅁰紇嚩二合引也十娑賀娑囉二合步惹引也十一翳係二合引呬婆去誐挽十二阿去引哩也二合嚩路枳帝濕嚩二合囉十三塢屹囉二合十四阿上底𢈔二合屹囉二合十五摩賀引塢屹囉二合十六摩賀引曩引娜十七枳里枳里枳里枳里十八弭里弭里弭里弭里十九唧哩唧哩唧哩唧哩二十曩跓知古反曩跓曩跓曩跓二十一訖囉二合娑訖囉二合娑訖囉二合娑訖囉二合娑二十二矩嚕矩嚕矩嚕矩嚕二十三翳係二合引呬二十四摩賀引尾引囉二十五麼懶娜娜二十六尾引哩演二合娜娜二十七嚩迦𤚥引銘二十八囉二合拽磋二十九試引竭𫬠二合嚩陜銘三十囉引瑟吒𫬠三合娑囉惹殑矩嚕三十一娑賀娑囉二合步惹三十二娑賀娑囉二合味囉路計濕嚩二合囉娑引䭾也三十三娑娜引悉朕地淫反銘婆去嚩三十四嚩囉努引婆去嚩三十五阿上麌嚕二合婆去嚩引銘三十六唵引三十七曩謨窣覩二合帝三十八婆去誐挽阿引哩也二合引嚩路枳帝濕嚩二合囉三十九囉二合沒地也二合四十囉二合枲引娜𤚥上四十一嚩囉努引麼麼婆去嚩引呬四十二娑嚩二合引賀引四十三聖觀自在菩千臂千眼心陀羅𡰱曩莫阿去引哩也二合引嚩路枳帝濕嚩二合囉引也一娑賀娑囉二合步惹引也二唵引三曩莫窣覩二合帝四囉二合枲星異反引娜五嚩囉努婆去嚩引弭六娑嚩二合引賀引七空觀心智真言佉無生種智真言阿卑下心智真言婀大悲種智真言娑慈悲種智真言纈哩二合平等心智真言暗菩提心智真言恭敬心智真言𤚥無為心智真言𢙣布字真言唵引阿去引嚧引力迦娑嚩二合引賀引觀自在菩根本真言唵引阿去嚧引力娑嚩二合引賀引聖觀自在菩大力威德馬首明王根本陀羅𡰱曩謨婆去誐嚩底二合一囉二合枳娘二合播引囉弭跢二曩謨喇怛曩二合怛囉二合夜引也三曩謨阿上弭跢引婆去引也怛他引跢引也四曩莫阿去引哩也二合引嚩路枳帝濕嚩二合囉引也五引地怛嚩二合引也六摩賀引怛嚩二合引也七摩賀引迦引嚕迦引也八嚩步引跢努劒播囉引也九嚩怛嚩二合弭也二合娑曩伽去引底寧十嚩怛嚩二合引謨乞叉二合迦引囉引也十一嚩尾你也二合引囉引惹引尾訖㗚二合跢引也十二摩賀引尾你也二合引囉引惹引囉二合穆訖帝二合十三翳釤曩莫塞訖㗚三合怛嚩二合十四伊上南上阿去引哩也二合引嚩路枳帝濕嚩二合囉十五木屈娜擬二合引􅚤㗚拏二合十六滿怛囉二合麼引襪㗚多二合逸史夜二合引弭十七􅞣嚩遏􅚼㗚他二合娑引䭾劒十八嚩尾􅍕覲曩二合佉去多劒十九嚩尾灑曩引捨難上二十唵引二十一吽吽吽引二十二多嚕攞二十三尾嚕攞二十四嚩尾覲曩二合伽去多迦二十五入嚩二合理多尾娑普二合陵上誐吒入重聲呼賀娑二十六計娑囉攃吒娑跓知固反引跛二十七嚩日囉二合齲囉捏寧逸反􅖽伽去多曩二十八左里多嚩素䭾引二十九多攞𩕳濕嚩二合引娑麼二合引嚕妬引得乞插三合多三十䭾囉𡰱反䭾囉三十一鼻灑拏引吒入賀引娑三十二阿上跛哩弭多麼攞三十三跛囉引屹囉二合麼三十四鼻多部引多拏引三十五沒地也二合沒地也二合三十六賀也屹哩二合嚩三十七佉引娜佉引娜三十八跛囉滿怛囉二合三十九𠸪乞叉二合𠸪乞叉二合四十遏引􅇁答麼二合滿怛囉二合引悉朕地反銘四十一阿引尾捨阿引尾捨四十二入嚩二合囉比捨左引南上四十三嚩屹囉二合係澀嚩二合四十四囉二合底賀妬嚩囉四十五嚩日囉二合能上瑟吒囉三合緊唧囉也枲四十六伊上南上訥瑟吒二合屹囉二合憾四十七訥瑟吒二合􅛶㗚𠰢二合下補敢反嚩四十八度曩度曩四十九麼他麼他五十吒吒五十一滿䭾滿䭾五十二沒䭾達磨僧去伽去五十三阿上努枳娘二合擔羯􅝝磨矩嚕五十四試引竭𫬠二合五十五賀也屹㗚二合嚩引也吒半音呼下同五十六嚩日囉二合引也吒半五十七嚩日囉二合遇引怛囉二合引也吒半五十八嚩日囉二合寧怛囉二合引也吒半五十九嚩日囉二合能上瑟吒囉三合引也吒半六十嚩日囉二合齲引囉引也吒半六十一嚩日囉二合齲囉捏寧逸反􅖽伽去哆曩引也吒半六十二跛囉滿怛囉二合引尾曩引捨曩引也吒半六十三怛二合路枳也二合婆去孕迦囉引也吒半六十四嚩羯弭澀嚩二合阿上囉二合底賀多引也吒半六十五嚩日囉二合矩攞怛囉二合引娑曩引也吒半六十六吽引吽吽六十七吒半吒半吒半六十八娑嚩二合賀引六十九聖觀自在菩大力威德馬