body:
  text: 上都大安國寺傳密教超悟大師賜紫三藏沙門行琳集金剛界毗盧遮那如來陀羅尼毗盧遮那如來五字心陀羅尼毗盧遮那如來無所不生陀羅尼毗盧遮那如來心陀羅尼毗盧遮那如來出生種種巧智百光遍照陀羅尼毗盧遮那如來根本陀羅尼光明遍照如來心陀羅尼釋迦牟尼如來勝幡陀羅尼釋迦牟尼如來陀羅尼釋迦牟尼如來俱胝陀羅尼釋迦牟尼如來陀羅尼釋迦牟尼如來根本陀羅尼二道下闕呪一道釋迦牟尼如來不動金剛三摩地陀羅尼釋迦牟尼如來佛眼陀羅尼二道阿閦如來根本陀羅尼阿閦如來心陀羅尼不動如來心陀羅尼寶生如來陀羅尼無量光如來根本陀羅尼無量光如來心陀羅尼無量光如來陀羅尼觀自在王如來陀羅尼阿陀佛大身陀羅尼阿陀佛滅一切罪根陀羅尼無量壽如來甘露鼓音陀羅尼無量決定壽命如來陀羅尼佛大慈陀羅尼如來大慈護陀羅尼一切如來大慈陀羅尼如來大慧力陀羅尼如來大力大護陀羅尼如來十力陀羅尼如來袈裟陀羅尼如來心印陀羅尼如來跋折羅陀羅尼二道金剛界毗盧遮那如來陀羅尼唵一嚩日囉二合馱引覩引二無敢反三毗盧遮那如來五字心陀羅尼曩莫三滿多沒馱引南上引一阿引入味引囉吽引欠二毗盧遮那如來無所不生陀羅尼曩莫嚩怛他引帝毗喻二合引一尾濕嚩二合引目契毗藥二合二嚩他三婀上阿去引暗𢙣四毗盧遮那如來心陀羅尼曩莫三滿多沒馱引南上引一婀上音呼二毗盧遮那如來出生種種巧智百光遍照陀羅尼曩莫三滿多沒馱引南上引一暗去二毗盧遮那如來根本陀羅尼曩莫三滿多沒馱引南上引一阿引入二尾三摩三娑頗二合囉呬懵上誐誐曩劒四達磨馱怛嚩二合五阿引迦捨三麼多也六嚩怛他引多㗚産二合七滿拏攞引布引惹麼𥠖拏八怛他引跢引地瑟姹二合曩九阿上麼𥠖曩左十娑嚩二合引賀引十一光明遍照如來心陀羅尼唵引一入嚩二合攞抳二吽引三釋迦牟尼如來勝幡陀羅尼曩謨引舍引枳也二合母曩一怛他引去跢引夜引二囉曷二合帝三𦴭三沒馱引也三怛你也二合他去引四唵五陜銘陜銘六嚩播引跛囉二合陜麼寧七娑嚩二合引賀引八釋迦牟尼如來陀羅尼曩莫三滿多沒馱引南上引一嚩吉禮二合捨𩕳素引娜曩二嚩達磨嚩始多三囉二合引多二合四誐誐曩娑麼引娑麼五娑嚩二合引賀引六釋迦牟尼如來俱胝陀羅尼曩謨引婆去誐嚩帝一舍引枳也二合母曩二怛他引跢引夜引三囉曷二合帝三𦴭三沒馱引也四怛你也二合他去引五唵六素􅋪乞讖銘三合素乞讖銘三合七扇引帝難上帝八拽戍帝薺自反九嚩沒馱引地瑟姹二合引曩引地瑟恥二合帝十娑嚩二合引賀引十一釋迦牟尼如來陀羅尼曩謨引婆去誐嚩帝一舍引枳也二合母曩二怛他引跢引夜引三囉曷二合帝三𦴭三沒馱引也四怛你也二合他去引五唵六母𩕳母𩕳七摩賀引母𩕳八娑嚩二合引賀引九釋迦牟尼如來根本陀羅尼曩謨引婆去誐嚩帝一舍引枳也二合母曩怛他引跢引夜引二囉喝二合帝三𦴭三沒馱引也三怛你也二合他引四唵引五阿上爾帝六阿上爾多惹七賀囉賀囉八悉底哩三合也引九嚩路枳帝十迦囉迦囉十一摩賀引三麼也悉第十二婆去囉婆去囉十三摩賀引引地滿拏尾薺十四娑麼二合囉三麼劒三麼焰十五引地引地十六摩賀引引地十七娑嚩二合引賀引十八本師釋迦牟尼如來不動金剛三摩地陀羅尼曩謨引婆去誐嚩帝一娑蘇囉引蘇囉二麼穆矩跓吒句反娜佶㗚三合瑟吒二合三左囉拏引囉尾引二合娜也四娑嚩二合琰部吠麌囉吠五路迦呬多羯底𭋸二合六怛他去引跢引野七娑引悉底𭋸二合八母曩九味引多怒引灑也十扇引旦引麼𭰖去蘇嚕引跛也十一洛乞義二合𠯆尼句反入嚩二合攞襪拶細十二阿上努尾琰二合惹曩楞上訖㗚二合多設哩引囉引也十三嚩麌拏三布􅚤㗚拏二合引也十四曩謨引曩莫囉二合賀悉多二合穆佉囉引尾引二合那十五補嚕二合答普二合攞引悉多麼攞十六麼嚕唧上囉佐引嚕你引妬二合引答跢二合引十七尾囉攞娑麼悉多娜捨曩引也十八素哩琰二合引戍娑上賀娑囉二合入嚩二合攞引十九迦攞跛紇𭋸二合比多滿拏攞引也二十跛囉麼母曩二十一娜捨麼攞引也二十二唵二十三暴引二十四吽引吽引二十五𢙣引𢙣引二十六呬引呬引二十七始嚩始嚩二十八扇底扇底二十九陜麼陜麼三十陜麼引跛也麼麼三十一怛闥多努多娑嚩二合婆去嚩三十二婆去引嚩引婆去嚩三十三娑母娜夜引三十四娑上麼麼攞三十五阿尾囉攞麼攞三十六阿弭多麼攞引底麼攞三十七共共具滲反三十八達嘮二合達嘮二合三十九勃嘮二合勃嘮二合四十陛𭋸二合拏陛𭋸二合拏四十一呬引婆去誐吻婆去挽無滿反多迦四十二蘇囉跢暴引誐跛賀四十三扇引底迦囉四十四播跛吉􅁂里尾二合灑曩引捨曩四十五娑嚩二合引賀引四十六釋迦牟尼如來佛眼陀羅尼唵引一鑠計二合三麼二燥銘三娑嚩二合引賀引四又釋迦牟尼如來佛眼陀羅尼唵引一尾嚧引左𩕳二娑嚩二合引賀引三東方妙喜世界阿閦如來根本陀羅尼曩謨引婆去誐嚩帝一𢙣屈二合毗夜二合也二怛他引跢引夜引囉曷二合帝三𦴭三去沒馱引也三怛你也二合他引四唵引五迦迦𩕳迦迦𩕳六嚧引左𩕳嚧引左𩕳七咄嚕二合吒𩕳咄嚕二合吒𩕳八怛囉二合娑𩕳怛囉二合娑𩕳九囉二合底賀多𩕳囉二合底賀多𩕳十嚩羯􅝝磨跛𫬠跛囉引銘十一𢙣屈二合毗夜二合覩十二娑嚩二合引賀引十三阿閦如來心陀羅尼唵引一𢙣屈二合毗夜二合二吽引三不動如來心陀羅尼唵引一乞義二合拏尾帝二吽三寶生如來陀羅尼唵引一喇怛曩二合三婆去嚩二怛𠸪二合三西方極樂世界無量光如來根本陀羅尼曩謨引喇怛曩二合怛囉二合夜引也一曩莫阿去引哩也二合阿上弭跢引婆去引也怛他引跢引夜引二囉曷二合帝三𦴭三沒馱引也三怛你也二合他引四唵引五阿蜜㗚二合帝六阿上蜜㗚二合妬納婆二合吠引七阿上蜜㗚二合多三婆去吠八阿上蜜㗚二合多陛九阿上蜜㗚二合多悉第十阿上蜜㗚二合多帝薺十一阿上蜜㗚二合多尾訖囒二合引帝十二阿上蜜㗚二合多尾訖囒二合多誐引弭寧去十三阿上蜜㗚二合多誐誐曩吉引㗚底二合迦𭋸十四阿上蜜㗚二合多嫩上努鼻入娑嚩二合𭋸十五􅞣嚩遏􅚼喇他二合娑引馱寧去十六嚩羯磨吉禮二合捨乞義二合孕迦𭋸引十七娑嚩二合引賀引十八無量光如來心陀羅尼唵一阿上蜜㗚二合多帝薺賀囉二吽引三無量光如來陀羅尼曩謨引阿上弭跢婆去引也一怛他引跢引也二怛你也二合他引三阿蜜㗚二合妬納婆二合吠四阿蜜㗚二合多三婆去吠五阿蜜㗚二合多尾訖囒二合引帝六娑嚩二合引賀引七觀自在王如來陀羅尼唵一路引計濕嚩二合囉囉引惹二紇哩二合引三阿陀佛大身陀羅尼曩謨引沒馱引也一曩謨引達磨引也二曩謨引僧去伽去引也三曩謨引阿上弭跢引婆去引也怛他引跢引夜引四囉曷二合帝三𦴭三沒馱引也怛你也二合他引五阿上蜜㗚二合帝六阿上蜜㗚二合妬納婆去二合吠七阿上蜜㗚二合跢去三婆去吠八阿上蜜㗚二合多尾訖囒二合引多誐引弭寧九誐誐曩吉引􅚲㗚底二合迦𭋸十嚩播跛乞義二合孕迦𭋸十一娑嚩二合引賀引十二阿陀佛滅一切罪根陀羅尼曩莫阿去引哩也二合阿上弭跢引婆去也怛他引跢引夜引一囉曷二合帝三𦴭三沒馱引也二怛你也二合他去引三唵四阿上蜜㗚二合帝五賀曩賀曩六嚩播引跛𩕳七娜賀娜賀八嚩播引跛𩕳九吽引十吒半音吒十一娑嚩二合引賀引十二無量壽如來甘露天鼓音陀羅尼怛你也二合他去引一麼𥠖二阿上麼𥠖三娑麼麼𥠖四捏寧反􅛎𭰖去勢五捏同上􅗭惹引多𩕳六𩕳嚕入訖帝二合七𩕳穆訖帝二合八入嚩二合攞嚩囉砌娜𩕳九蘇佉引嚩底捏同上􅛎𭰖去勢十阿上蜜㗚二合多引𢈔麼𥠖十一阿上蜜㗚二合多引也婆去引馱寧去捏同上􅟓賀𭋸十二阿上蜜㗚二合多引也囉二合娑引馱寧十三沒第𩕳沒第十四阿引迦捨𩕳沒第十五阿引迦捨捏同上𭰖去勢十六阿引迦捨捏同上􅗭惹悉帝二合十七阿引迦捨矩捨𥠖十八阿引迦捨𩕳捺㗚捨二合寧十九阿引迦捨引地瑟姹二合引寧二十蘇佉引嚩底阿上地瑟姹二合寧二十一嚕引跛捏同上􅛎𭰖去勢二十二拶怛嚩二合引哩達磨引囉二合娑引馱寧二十三拶怛嚩二合引哩阿引哩也二合底也二合囉二合娑引馱寧二十四拶怛嚩二合引哩沫引㗚誐二合婆去嚩曩囉二合娑引馱寧二十五麼攞尾引哩也二合囉二合娑引馱寧二十六達􅝝磨砌娜寧二十七矩捨𥠖二十八矩捨攞捏同上𭰖去勢二十九矩捨攞囉二合底瑟姹二合引寧三十沒馱矩捨𥠖三十一尾沒馱囉二合婆去細三十二達磨阿引迦引囉三十三捏同上􅗭惹悉帝二合三十四捏同上沒待引尾麼𥠖三十五尾囉薺三十六囉惹娑𥠖三十七囉娑引屹𭋸二合三十八囉娑引屹囉二合麼𥠖三十九囉娑引屹囉二合阿上地瑟耻二合帝四十矩捨𥠖囉二合底矩捨𥠖四十一尾矩𥠖憚去引帝四十二蘇上憚帝唧帝四十三蘇囉二合扇引唧帝四十四蘇囉二合底瑟恥二合帝四十五蘇𥠖蘇穆契四十六馱銘馱銘四十七麼𥠖左麼𥠖四十八阿上努捨也麼𥠖四十九沒馱阿引迦捨麼𥠖五十沒馱阿引迦捨麌五十一沒馱阿引迦捨捏同上􅖵麌五十二阿上蜜㗚二合多嫩上努鼻娑嚩二合囉囉引惹引馱引囉五十三娑嚩二合引賀引五十四無量決定壽命如來陀羅尼曩謨阿上跛哩弭多引𢈔枳娘二合曩尾寧室左二合也一囉引忍自引反捺囉二合引野怛他引跢引也二唵引三嚩僧去塞迦二合引囉跛哩秫馱四達磨帝五摩賀引曩野六跛哩嚩引𭋸七娑嚩二合引賀引八佛大慈陀羅尼曩莫三滿多沒馱引南上引一摩賀引每底哩也三合尾賀哩喃二沒馱每底啉二合引曩麼寫銘三三去母答半二合寧婆去也引曩計四迦攞係尾屹囉二合係載嚩五設咄嚕二合赧左跛囉引惹六也夜引麼引囉麼攬薄􅍓屹南上二合七賽你也二合麼攞嚩引賀南上引八跢引曩引憾吉引㗚多二合以史也二合弭九嚩遏喇他二合娑地劒十拽納麼二合攬嚩沒馱引南上引十一遏囉曷二合單去引左引比拽納麼二合攬十二達磨寫左帝薺曩十三􅞣挽曩引勢比播引跛劒十四怛你也二合他去引十五矩蒸即孕反擬𩕳矩蒸擬𩕳十六盎阿朗反矩哩十七瞢上矩哩十八麼引哩引唧十九􅚤㗚拏二合舍嚩哩二十𠸪乞義二合𠸪乞義二合𤚥二十一嚩怛挽二合引室左二合二十二矩麼引哩二十三室哩二合麼引里寧二十四娑嚩二合引賀引二十五毗盧遮那如來大慈護三昧耶陀羅尼唵一沒馱每底哩二合引二嚩日囉二合𠸪乞義二合憾引三一切如來大慈陀羅尼曩莫嚩怛他引帝􅝱毗喻二合引一底瑟綻𭎋諫反二合底娜捨你勢引二唵三麼嚩日𭋸二合引四紇㗚二合乃也嚩日𭋸二合引五麼引囉賽先代反娘你癢反尾捺囉二合引跛寧引六賀曩賀曩七嚩日囉二合陛引八怛囉二合引娑野怛囉二合引娑野九嚩麼囉婆去嚩曩引𩕳十吽引吽引十一散馱囉散馱囉十二沒馱引昧引底哩二合引十三嚩怛他引多十四嚩日囉二合羯臘播二合引地瑟耻二合帝十五娑嚩二合引賀引十六如來大慧力陀羅尼曩莫三滿多沒馱引南上引一摩賀引朅誐尾囉惹二達磨散捺㗚捨二合迦三娑賀惹迦引也四你