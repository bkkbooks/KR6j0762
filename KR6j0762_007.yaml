body:
  text: 上都大安國寺傳密教超悟大師賜紫三藏沙門行琳集大寶積經無邊莊嚴會無上陀羅尼大寶積經出現光明會殊勝陀羅尼大寶積經無邊莊嚴會無上陀羅尼怛你也二合他引一惹尾惹二計迦嚩底三阿引路引計阿引路迦嚩底四囉二合陛囉二合婆去嚩底五捺㗚捨二合寧六𩕳捺㗚捨二合南上嚩底七遏􅛂㗚替二合遏㗚他二合嚩底八戍引馱寧九尾戍引馱寧十跛哩戍引馱寧十一訖㗚二合訖㗚二合也嚩底十二嗢多囉十三散跢引囉十四摩賀引尾惹十五摩賀引尾惹也嚩底十六阿上努散地十七阿上囉二合底散地十八喻引誐麼呬呬引反娜馱十九悉地悉馱遏㗚替二合二十悉馱遏㗚他二合嚩底二十一麼底麼底二十二囉二合陛二十三嗢多哩嗢多囉嚩底二十四尾麼𥠖尾麼攞努散地二十五娑𭋸娑囉嚩底二十六娑囉引努帝二十七娑銘娑麼攬婆去尾帝二十八底阿上𩕳底二十九阿上囉二合底𩕳嚩底三十尾勢曬尾勢灑嚩底三十一阿上麼理𩕳阿麼理𩕳三十二囉二合麼理𩕳三十三塢引賀嗢多囉三十四麼囉囉二合娜三十五阿上勢曬三十六阿上努跛勢曬三十七阿上努銘三十八阿上囉二合底誐銘三十九阿上帝阿上娜底四十底尾戍引馱𩕳四十一跛哩秫第四十二殑寄亮反乞義二合砌娜𩕳麼帝四十三麼底囉二合吠帝四十四麼底尾戍引馱𩕳四十五三滿多引努帝四十六三滿多跛哩嚩𭋸四十七三滿多尾戍引馱𩕳四十八阿上努跛吃囉二合呬四十九阿上𩕳屹囉二合呬帝五十呬曩遏㗚替二合五十一遏㗚他二合尾秫第跛囉銘五十二係覩你地散寧囉二合吠底五十三囉二合吠多嚩底五十四尾𩕳室左二合五十五尾𩕳室左二合夜引努帝五十六阿上難上多遏㗚替二合五十七阿上難上多尾屹囉二合係五十八麼惹尾秫第五十九阿上努屹囉二合係六十囉二合屹囉二合賀尾戍引馱𩕳六十一阿上你也二合引􅇁答麼二合尾帝六十二麼呬引入􅛔㗚馱二合尾戍引馱𩕳六十三尾你也二合引努底六十四尾你也二合引努散地六十五跛哩戍引馱𩕳六十六娑嚩二合引賀引六十七大寶積經出現光明會殊勝陀羅尼怛你也二合他去一呬𥠖麼𥠖二麼𥠖悉第三伊上𭰖去弭𭰖去四矩路你𢈔二合矩路你𢈔二合矩𥠖五麼𥠖矩拏帝六阿上囉藝阿上呬𥠖七弭弭𥠖帝八蘇上弭𥠖九弭𥠖弭𥠖十企比𥠖阿上比𥠖十一蘇帝替馱抳十二麼抳引誐抳去誐哩帝十三蘇誐𭋸十四哩也二合枳娘二合曩寧十五阿上努路弭計尾路銘十六蘇上娑你㗚二合勢十七阿上始哩𥠖十八嚩囉二合帝二合十九囉二合尾呬馱引囉二十底瑟恥二合引賀蘇上底二十一遏㗚剃二合步穰自朗反誐誐曩二十二禁俱滲反畔拏嚩娑引嚩曩二十三跛哩咄里也二合𩕳二十四跛哩誐拏𩕳二十五麼曩娑二十六蘇路唧多跛娜二十七𢙣乞義二合囉二十八阿上鼻臘引比也二合二十九囉二合底瑟姹二合引馱引囉抳三十阿爾多麌去引尾三十一娑嚩二合引賀引三十二
