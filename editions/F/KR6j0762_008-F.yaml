body:
  text: 上都大安國寺傳密教超悟大師賜紫三藏沙門行琳集出生無邊門陁羅尼寶樓閣善住秘密陁羅尼心及心中心陁羅尼二道大隨求無能勝明王陁羅尼及一切如來心等陁羅尼七道隨求大護明王陁羅尼毗婆尸佛陁羅尼尸棄佛陁羅尼毗舍浮佛陁羅尼拘留孫佛陁羅尼拘那含牟尼佛陁羅尼迦葉佛陁羅尼釋迦牟尼佛陁羅尼虛空藏菩陁羅尼出生無邊門陁羅尼怛你也二合他引一阿上尼經反二阿上契三麼契穆契四三滿多穆契五素銘六底也二合引囉銘七掃底欲訖帝二合八𩕳嚕入訖帝二合九𩕳嚕入訖底二合囉二合陛十呬𥠖十一呬里羯臘閇二合十二羯臘跛二合枲十三娑引𭋸十四娑引囉嚩底十五呬𥠖十六呬𥠖十七呬𥠖十八呬𥠖十九呬𥠖二十呬𥠖二十一呬𥠖二十二呬里𥠖二十三摩賀引呬里𥠖二十四讚左嚩寧二十五嚩囉引左囉二十六阿上左𥠖二十七麼左𥠖二十八阿上難上帝二十九阿上難上多底三十阿上囉儜三十一捏寧逸反下同􅝝麼去引三十二捏同上嚩跛寧三十三捏同上􅞣㗚多二合寧三十四捏同上憚帝三十五達磨䭾𭋸三十六𩕳引賀𭋸三十七捏同上賀𭋸三十八尾麼𥠖三十九試攞尾戍引䭾寧四十囉二合訖㗚二合底你你異反引跛寧四十一婆去嚩尾婆去引嚩寧四十二阿上僧藝四十三阿上僧去誐尾賀𭋸四十四娜銘四十五尾麼𥠖四十六尾摩攞囉二合陛四十七僧去羯㗚灑二合儜四十八地𭋸四十九地地𭋸五十摩賀引地地𭋸五十一也勢五十二也戍嚩底五十三左𥠖五十四阿上左𥠖五十五麼左𥠖五十六三麼左𥠖五十七涅㗚二合茶去散地五十八蘇上悉體町以反二合𭋸五十九阿上僧去藝六十阿上僧去誐尾賀𭋸六十一阿上僧去誐捏同上􅟓賀引𭋸六十二𩕳引賀引囉尾麼𥠖六十三𩕳引賀引囉戍䭾寧六十四涅㗚二合茶去蘇上銘六十五悉體二合𭋸六十六娑他二合引銘娑他二合引麼韈底六十七摩賀引囉二合陛六十八三滿多囉二合陛六十九尾補攞囉二合陛七十尾補攞囉濕弭二合七十一三滿多穆契七十二嚩怛囉二合引努帝七十三阿上曩砌你二合七十四䭾引囉七十五𩕳䭾引寧七十六達磨𩕳䭾曩遇底𭋸二合七十七三滿多囉二合陛七十八嚩怛他引跢引七十九地瑟姹二合引曩引地瑟恥二合帝八十娑嚩二合引賀引八十一廣大寶樓閣善住秘密陁羅尼曩莫嚩怛他引跢引南上引一唵二尾補攞陛三麼囉二合陛四怛闥跢引𩕳捺㗚捨二合甯五麼麼六蘇上囉二合陛七尾麼𥠖八娑引囉儼鼻引𭋸九吽引吽引十入嚩二合攞入嚩二合攞十一沒䭾引尾路枳帝十二麌入呬也二合引地瑟耻二合多陛十三娑嚩二合引賀引十四心陁羅尼唵一麼嚩日𭋸二合二吽引三心中心陁羅尼唵一麼尼反䭾𭋸二吽引三吒半音四普遍光明清淨熾盛如意寶印心無能勝大明王大隨求陁羅尼曩莫嚩怛他去引跢引南上引一曩謨引曩莫二嚩沒䭾三引地怛嚩二合四沒䭾達磨僧去祇歧反引毗藥二合五唵引六尾補攞陛七尾補攞尾麼𥠖引八惹也陛九嚩日囉二合入嚩二合引攞陛十誐底丁以反誐賀寧十一誐誐曩尾戍引䭾寧引十二嚩播引跛尾戍引䭾寧引十三唵引麌拏鼻嚩底十四誐誐哩十五儗倪以反哩儗哩十六儼麼鼻哩儼麼哩十七虐賀虐賀十八誐哩誐哩十九誐誐哩誐誐哩二十儼婆去哩儼婆去里二十一誐底誐底二十二誐麼𩕳誐𭋸二十三麌嚕麌嚕麌嚕二十四左𥠖引阿上左𥠖引二十五母左𥠖引二十六惹尾惹引二十七嚩婆去也尾帝二十八婆去三婆去囉二十九悉哩悉哩三十弭哩弭哩三十一歧去哩歧去哩三十二三去滿跢羯㗚灑二合三十三嚩設咄嚕二合囉二合沫􅚼他去𩕳三十四𠸪乞灑二合𠸪乞灑二合麼麼三十五嚩怛嚩二合引難上引左三十六尾哩尾哩三十七尾跢引嚩囉拏婆去也曩引捨𩕳三十八蘇上哩蘇上哩三十九唧理劒麼𥠖引尾麼𥠖四十惹惹夜引嚩奚去引四十一惹也嚩底四十二婆去誐嚩底四十三喇怛曩二合麼矩吒四十四麼引邏引䭾哩四十五麼護尾尾䭾四十六尾唧怛囉二合吠引灑嚕引跛䭾引哩四十七婆去誐嚩底四十八摩賀引尾你也二合引去尾四十九𠸪乞灑二合𠸪乞灑二合麼麼五十嚩怛嚩二合引難上引左五十一三去滿跢引嚩怛囉二合五十二嚩播引跛尾戍引䭾𩕳五十三護嚕護嚕五十四諾乞剎二合怛囉二合麼引攞引䭾引哩五十五𠸪乞灑二合𠸪乞灑二合𤚥引麼麼五十六阿上曩引闥冩引五十七怛囉二合拏跛囉引也拏冩五十八跛哩謨引左也銘引五十九嚩耨契毗藥二合六十讚膩上讚膩上讚膩𩕳六十一吠引誐嚩底六十二嚩訥瑟吒二合𩕳嚩引囉六十三設咄嚕二合博乞灑二合囉二合沫􅚼他去𩕳六十四尾惹也嚩引呬𩕳六十五護嚕護嚕六十六母嚕母嚕六十七祖嚕祖嚕六十八阿引欲播引攞羅可反𩕳六十九素上囉嚩囉沫他去𩕳七十嚩去引嚩多引布引尒帝七十一地哩地哩七十二三去滿跢引嚩路枳帝引七十三囉二合陛囉二合陛七十四素囉二合婆去尾秫第引七十五嚩播引跛尾戍引䭾𩕳七十六䭾囉䭾囉䭾囉七十七達囉達𭋸七十八素母素母七十九嚕嚕左𥠖引八十佐引攞也訥瑟𭌻二合八十一布引囉也銘引阿去引苫去室哩二合嚩補八十二䭾難上惹也劒麼𥠖引八十三乞史二合乞史二合八十四嚩囉去嚩囉能上引矩勢引八十五唵引納麼二合尾秫第八十六戍引䭾也戍引䭾也秫第引八十七跋囉跋囉八十八鼻哩鼻哩八十九部嚕部嚕九十懵上誐攞尾秫第九十一跛尾怛囉二合穆企九十二朅祛反儗朅儗九十三佉上囉佉上囉九十四入嚩二合里多始𭋸九十五三去滿多囉二合娑上哩跢引九十六嚩婆去悉多秫第九十