body:
  text: 上都大安國寺傳密教超悟大師賜紫三藏沙門行琳集法身緣生句發菩提心陁羅尼并讚菩提心功德普礼陁羅尼淨三業陁羅尼清淨陁羅尼懺一切罪陁羅尼破决定業障陁羅尼加持閼伽水陁羅尼讚歎三寶滅罪陁羅尼加持念珠陁羅尼善夜經陁羅尼護命法門陁羅尼解冤結陁羅尼消化食陁羅尼七曜吉祥陁羅尼破宿曜陁羅尼除一切疾病陁羅尼除一切眼病陁羅尼除痔病陁羅尼除一切𢙣毒腫陁羅尼妙法蓮花經陁羅尼六道上佛殿塔陁羅尼毗盧遮那經說諸曜陁羅尼及諸宿曜陁羅尼法身緣生偈引達磨引係覩囉二合婆去嚩引係凍凍字合口呼一娑帝二合釤引怛他去引妬引呬野二合嚩捺二翳產左喻𩕳嚧引䭾三翳嚩引你去引摩賀引室囉二合麼拏引入四發菩提心陁羅尼唵引一引地唧多母荅播二合引二娜夜引弭三普礼陁羅尼曩莫嚩怛他去引多播娜一滿娜能上迦盧引弭二淨三業陁羅尼唵引一娑嚩二合婆去嚩秫入鐸二嚩達磨娑嚩二合婆去嚩秫入度引三憾四清淨陁羅尼唵一秫入第二耨戍引䭾曩引野三娑嚩二合引賀引四普懺一切罪陁羅尼唵一嚩播跛二娑普二合吒諾賀曩三嚩日囉二合引野四娑嚩二合引賀引五佛說破决定𢙣業障陁羅尼唵一嚩日囉二合羯􅝝磨二尾戍引䭾野三嚩引嚩囉拏引𩕳四沒䭾底二合曩三麼五吽引六加持閼伽水陁羅尼唵一嚩日𡀔二合引娜迦二吽引三讚歎三寶神力滅罪陁羅尼出瞿多集曩謨納嚩二合曩嚩底引南上一三𦴭三沒䭾句引置引南上二曩謨納嚩二合曩嚩底引南上三達磨句引置引南上四曩謨納嚩二合曩嚩底引南引五僧去伽去句引置引南上六怛你也二合他引七唵八麼𥠖九尾麼𥠖十捏寧逸反􅝝麼𥠖十一嚩播引跛乞义二合孕迦𭋸十二娑嚩二合引賀引十三加持念珠陁羅尼唵一嚕唧囉麼二囉二合韈㗚跢二合引野三吽引四善夜經陁羅尼怛你也二合他引一鼻𩕳婆去囉二滿䭾麼難上麼𩕳三置上置上置上置上四遇引哩巘䭾引哩五賛拏理麼引蹬上儗六娑囉麼囒帝七麼護囉八左跛哩作羯囉二合嚩計九捨嚩哩摩賀引捨嚩哩十步尒誐十一𩕳弭𩕳銘誐十二訖㗚二合多𩕳十三娑嚩二合引賀引十四僧去野體引南上十五阿上囉帝十六捺囉二合帝十七謗蘇上劫播引十八劫布引得迦二合播引十九荅布二合引難上𭰖去二十娑嚩二合引賀引二十一復說善夜陁羅尼曰怛你也二合他去一呬理呬理二弭理伊上理三比捨止四囉拏二合捨嚩哩五止哩六娑嚩二合引賀引七佛說護命法門陁羅尼名為善門怛你也二合他去一鄔矩母矩二鄔矩麼比三滿䭾𩕳四嚩囉左麼𩕳五麼護𥠖麼護𥠖六娜護上七護護上𥠖八韈跢引野九娑嚩二合引賀引十佛復說諸佛之所護念陁羅尼長壽法門怛你也二合他去一嚩日𭋸二合嚩日𭋸二合嚩日𭋸二合二嚩日囉二合䭾𭋸三嚩日囉二合嚩底四嚩日囉二合吠底五嚩日囉二合娜地六作羯囉二合嚩日𭋸二合七作羯囉二合䭾𭋸嚩𭋸八䭾𭋸䭾𭋸九鼻𭋸鼻𭋸十母𭋸止𭋸十一護護𭋸十二瞢鼻鼻𭋸十三始𭋸十四𭋸𭋸始十五祖祖哩十六嚕嚕止十七嚩𭋸左𥠖十八祖𥠖母𥠖左𥠖十九滿拏𥠖二十滿拏𩕳二十一嚩播引跛尾曩引捨𩕳二十二嚩嚧迦囉二合捨麼𩕳二十三阿上迦攬沒㗚二合底𢈔二合囉二合底娑引䭾𩕳二十四夜引嚩覩二十五嚩跛曩囉二合底娑引䭾𩕳二十六怛你也二合他去二十七麼娜𩕳二十八誐誐囉二十九謨娜𩕳三十三去囉二合謨娜𩕳三十一曩引捨𩕳囉二合曩引捨𩕳三十二嚩弭野二合引地囉二合捨麼𩕳三十三夜引嚩覩嚩跛曩三十四阿上迦攬沒㗚二合底𢈔二合囉二合底娑引䭾𩕳三十五怛你也二合他去三十六曩引捨𩕳曩引捨𩕳三十七滿䭾𩕳滿䭾𩕳三十八親去娜親去娜三十九鼻𭋸弭𭋸娑𭋸四十賀多𡩋嚩𭋸四十一嚩𭋸嚩𭋸尾地四十二尾𭋸尾𭋸尾𭋸四十三塢灑𭋸四十四捨囉𡩋四十五嚩囉嚩嚕四十六嚩囉迦拏四十七沒囉二合憾麼二合左哩野二合四十八印上捺囉二合嚩底四十九地地囉野五十曩謨摩係濕嚩二合囉𩕳五十一乙㗚二合史嚩度𩕳五十二播引跛惹賀𩕳五十三迦引攞嚩地𩕳五十四步多嚩地𩕳五十五底野二合迦遏􅛂㗚剃二合五十六素引麼跛底五十七素引麼囉二合陛五十八娑嚩二合引賀引五十九怛你也二合他去六十賀囉賀囉六十一呬𭋸六十二娑嚩二合引賀引六十三怛你也二合他去六十四羯致上多致上多六十五阿上曩六十六賀𭋸染婆去𡩋六十七翳迦羯他𡩋六十八補補勿反怛囉二合諾賀𩕳六十九麼伽去尾路引賀𩕳七十護娑嚩底七十一補娑嚩底補娑嚩底七十二呬哩呬哩七十三野他惹野七十四野他阿上􅍋儗𩕳二合七十五野他囒二合左七十六野他婆去琰七十七野他嚩日㘕二合七十八野他紇㗚二合乃琰七十九娑嚩二合引賀引八十句解一切冤結陁羅尼唵一諾賀諾賀二嚩訥瑟吒二合三囉二合訥瑟吒二合四怛囉二合喃引上五娑嚩二合引賀引六佛說消化食陁羅尼曩莫三滿多沒䭾引南上一阿上囉二合底賀多舍引娑曩引南上二怛你也二合他去三唵四嚩吉理尾二合灑曩引捨𩕳五曩引捨野曩引捨野六嚩訥瑟吒二合囉二合欲訖擔二合七三麼野麼努娑麼二合囉八吽引九弱自洛反十娑嚩二合引賀引十一七曜吉祥陁羅尼唵一嚩日囉二合室哩二合二摩賀引室哩二合三阿上捏寧逸反底野二合室哩二合四素引麼室哩二合五盎烏浪反誐囉迦室哩二合六母䭾室哩二合七勿㗚二合賀娑二合底室哩二合八戍訖囉二合室哩二合九舍𩕳室者二合囉室哩二合十摩賀引三麼野室哩二合十一娑嚩二合引賀引十二妙吉祥破諸宿曜陁羅