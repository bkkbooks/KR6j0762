body:
  text: 上都大安國寺傳密教超悟大師賜紫三藏沙門行琳集淨眼王如來陁羅尼寶如來陁羅尼寶如來名号功德并十二緣生句陁羅尼藥師瑠璃光如來陁羅尼藥師瑠璃光如來結願陁羅尼如來定力瑠璃光陁羅尼滅𢙣趣王如來陁羅尼智炬如來破地獄陁羅尼須劫如來消常住食陁羅尼月光寶莊嚴首威德眼自在王如來陁羅尼金剛摧壞陁羅尼金色寶光妙行成就如來陁羅尼佛剎莊嚴王如來陁羅尼妙色身如來施甘露陁羅尼金剛摧一切罪如來陁羅尼金剛嗢荅麼王如來除一切病陁羅尼實相如來心陁羅尼金光聚如來陁羅尼迦葉如來除𢙣風雨陁羅尼智慧奮迅王如來陁羅尼除一切障如來陁羅尼福德相如來陁羅尼遍身香如來陁羅尼無能勝勇猛如來陁羅尼大威德如來陁羅尼除盖障白蓮花光如來陁羅尼一切如來毫相陁羅尼無垢名稱如來陁羅尼花相如來陁羅尼持地王如來陁羅尼月光如來陁羅尼稱讚如來功德陁羅尼一切如來金剛壽命陁羅尼淨眼王如來陁羅尼曩莫室作二合屈二合跛哩戍引䭾曩囉引惹引也一怛他引跢引夜引囉曷二合帝三𦴭三沒䭾引也二怛你也二合他去引三唵四作屈二合五室左二合屈二合六枳孃二合曩室作二合屈二合七尾戍引䭾也八娑嚩二合引賀引九寶如來陁羅尼曩謨引婆去誐嚩帝一喇怛曩二合始企寧怛他引跢引夜引二囉曷二合帝三𦴭三沒䭾引野三怛你也二合他引四唵引五喇怛寧二合喇怛寧二合六摩賀引喇怛寧二合七喇怛曩二合始企寧八喇􅑐怛努二合引納婆二合去吠九喇怛曩二合三婆去吠引十娑嚩二合引賀引十一寶如來名及十二緣生句陁羅尼怛你也二合他去引一阿尾你也二合寧阿尾你也二合寧阿尾你也二合寧二僧塞迦二合囉僧去塞迦二合囉僧去塞迦二合囉三尾枳孃二合引𩕳寧尾枳孃二合引𩕳寧尾枳孃二合𩕳寧四娑嚩二合引賀引五但你也二合他引一曩引麼嚕引比曩引麼嚕引比曩引麼嚕比二殺拏引也多寧殺拏也多寧殺拏也多寧三娑二合􅞯捨寧娑二合捨寧娑二合捨寧四娑嚩二合引賀引五怛你也二合他引一尾娜寧尾娜寧尾娜寧二底㗚二合瑟置二合底㗚二合瑟置二合底㗚二合瑟置二合三鄔播娜𩕳寧鄔播娜𩕳寧鄔播娜𩕳寧四娑嚩二合引賀引五怛你也二合他引一婆去尾寧婆去尾寧婆去尾寧二惹引底寧惹引底寧惹引底寧三惹麼寧惹麼寧惹麼寧四惹􅇁荅麼二合𩕳寧惹荅麼二合𩕳寧惹荅麼二合𩕳寧五娑嚩二合引賀引六藥師瑠璃光如來陁羅尼曩謨引婆去誐嚩帝一佩殺尒也二合麌嚕吠引𠯆尼古反哩也二合囉二合婆去囉引惹引也二怛他引跢引夜引囉曷二合帝三𦴭三沒䭾引也三怛你也二合他引四唵引五佩殺尒二合佩殺尒二合六佩殺尒也二合三母娜二合帝七娑嚩二合引賀引八藥師瑠璃光如來大陁羅尼曩謨引喇怛曩二合怛囉二合夜引野一曩謨金矩唵反鼻引囉二合嚩日囉二合三茗佉攞四阿上𩕳攞引五娑𩕳攞六印娜攞七頞怛攞八嚩比攞九麼護囉十振即引反娜攞十一藻去度攞十二尾麼攞十三曩謨佩殺尒也二合麌嚕吠𠯆同上哩也二合十四囉二合婆去囉引惹引也怛他引跢引也十五怛你也二合他引十六佩殺尒二合佩殺尒二合十七佩殺尒也二合三去母娜二合帝十八娑嚩二合引賀引十九佛說如來定力瑠璃光陁羅尼怛你也二合他引一具銘具銘二伊上弭引呬三麼底麼底四䬃跢怛他引多三摩引地五阿上地瑟耻二合帝六阿上帝麼帝七左里二合引八播引跛戍䭾寧九嚩播跛曩引捨也十沒第沒度荅銘十一塢銘矩銘十二沒䭾乞曬二合怛囉二合十三跛哩戍䭾寧十四䭾銘𩕳䭾銘十五銘嚕引銘嚕引十六銘嚕引始佉𭋸十七嚩迦引里十八蜜㗚二合底𢈔二合𩕳嚩引囉十九沒第素沒第二十沒䭾引地瑟姹二合引寧曩二十一𠸪乞义二合覩銘二十二嚩引嚩二十三娑銘阿上娑銘二十四娑麼努引賀囒引覩銘二十五嚩沒䭾引地怛嚩二合二十六陜銘陜銘二十七囉二合陜滿覩銘二十八嚩伊上底塢捺囉二合嚩二十九嚩弭也二合引䭾也三十嚩怛嚩二合引難上左三十一布引囉寧布引囉寧三十二布引囉夜引銘三十三嚩阿引舍吠引𠯆同上哩也二合三十四囉二合底婆去細三十五嚩播跛乞义二合孕迦𭋸三十六娑嚩二合引賀引三十七滅一切𢙣趣王如來陁羅尼曩莫嚩訥􅖱底跛哩戍引䭾曩囉引惹引也一怛他引跢引夜引囉曷二合帝三𦴭三沒䭾引也二怛你也二合他去引三唵引四戍引䭾寧戍引䭾寧五嚩播跛尾戍引䭾寧六秫詩聿反第尾秫第七嚩羯磨阿引嚩囉拏尾秫第八娑嚩二合賀引九智炬如來破地獄陁羅尼曩莫阿上瑟吒二合試引底引南上引一三𦴭三沒䭾二句引置引南上引三唵四枳孃二合引曩引嚩婆去細五地哩地哩六吽引七須劫如來消常住食陁羅尼曩謨引婆去誐嚩帝一蘇銘嚕羯臘播二合引也二怛他引跢引夜引囉曷二合帝三𦴭三沒䭾引也三怛你也二合他引四唵五羯臘閇二合羯臘閇二合六羯臘播二合引跛哩秫第七娑嚩二合引賀引八月光寶莊嚴首威德眼自在王如來陁羅尼曩謨引婆去誐嚩帝一喇怛曩二合囉二合婆去賛捺囉二合二囉二合底滿多三室囉二合悉帝二合惹室哩二合引設囉迦哩引濕嚩二合囉囉引惹引野四怛他引多引夜引囉曷二合帝三𦴭三沒䭾引也五怛你也二合他去引六喇怛寧二合喇怛寧二合七喇怛曩二合吉㗚底二合八喇怛曩二合囉二合底滿帝九喇怛曩二合三婆吠十喇怛曩二合陛十一喇􅑐怛努二合娜二合帝十二娑嚩二合引賀引十三金剛摧碎如來陁羅尼曩謨引婆去誐嚩帝一嚩日囉二合娑引囉囉二合沫􅛊㗚你二合寧二怛他引