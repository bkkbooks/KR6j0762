body:
  text: 上都大安國寺傳密教超悟大師賜紫三藏沙門行琳集𭦟殊室利菩最勝心王陀羅尼𭦟殊室利菩千陀羅尼𭦟殊室利菩根本陀羅尼𭦟殊室利菩五根本陀羅尼𭦟殊室利菩五字陀羅尼𭦟殊室利菩六字陀羅尼𭦟殊室利大威德八字陀羅尼𭦟殊室利一字陀羅尼二道𭦟殊室利小心陀羅尼𭦟殊室利三字陀羅尼𭦟殊室利大忿怒陀羅尼𭦟殊室利滅一切罪陀羅尼𭦟殊室利寶藏陀羅尼無上悉地心陀羅尼隨心陀羅尼𭦟殊室利除一切怖畏陀羅尼𭦟殊室利聞持陀羅尼𭦟殊室利眷屬陀羅尼𭦟殊室利滿願陀羅尼𭦟殊室利聞持陀羅尼𭦟殊室利滅罪陀羅尼𭦟殊室利縛賊陀羅尼𭦟殊室利乞警誡陀羅尼𭦟殊室利速疾應驗陀羅尼𭦟殊室利加持莊嚴成就陀羅尼𭦟殊室利五種五字陀羅尼𭦟殊室利六種六字陀羅尼𭦟殊室利一字陀羅尼普賢菩般若佛母陀羅尼普賢菩行海陀羅尼普賢菩願海陀羅尼普賢菩大樂不空三昧耶陀羅尼普賢身陀羅尼普賢説住佛境界陀羅尼普賢根本陀羅尼普賢法身陀羅尼普賢勝慧陀羅尼普賢聞持陀羅尼普賢清淨陀羅尼普賢法界心陀羅尼普賢速疾現身陀羅尼四十九道諸菩會文殊師利最勝根本心王陀羅尼曩莫嚩怛他引帝毗喻二合引一囉曷二合毗藥二合二三𦴭三沒第毗藥二合引三唵四矩麼引囉嚕引比尾濕嚩二合三婆去嚩五阿引蹉阿引蹉六攞護攞護七勃嚕唵三合引勃嚕唵三合引八吽引吽引九爾自以反曩爾自翼反十滿乳室哩二合也素室哩二合也跢囉也𤚥十一嚩耨契毗藥二合十二吒半音吒半十三陜麼也陜麼也十四阿上蜜㗚二合妬納婆去二合務納婆去二合嚩十五播𠰢補敢反銘曩引捨也十六娑嚩二合引賀引十七金剛界大神變千聖𭦟殊室利童真大菩一百八名陀羅尼曩莫三滿多枳二合也一阿上勢灑娑二合囉拏尾秫馱沒地毗喻二合引二娜捨溺嚩怛他引帝毗喻二合引囉曷二合毗藥二合三𦴭三沒第毗藥二合三曩莫𭦟祖自魯反室哩二合四娑迦攞麼攞五迦楞上迦跛多際多細六尾麼攞麌拏引楞上訖㗚二合跢引也七阿上麼囉曩囉引蘇上囉八步惹誐尾你也二合引馱囉九惹吒引麼矩吒十𩕳迦史多十一播引娜臂湛坼鑒反母惹引也十二曩莫滿祖室哩二合曩莫滿祖具引灑引也十三摩賀引引地怛嚩二合引也十四尾尾馱引播也訥􅖱底十五尾娜引囉拏引也十六怛你也二合他引十七唵引十八抱引十九麼嚕唧囉羯邏引跛二十尾唧怛囉二合木訖多二合二十一娜引麼楞上訖㗚二合多二十二設唎引囉跛囉麼怛嚩二合二十三謨左迦二十四怛他引多達磨句捨馱囉二十五囉二合嚩囉達磨臘馱尾惹也二十六素囉多三去抱遇跛捺㗚捨二合迦二十七吉禮二合餉誐引囉二十八囉二合捨麼迦二十九舜你也二合跢三十娑嚩二合婆去引嚩引努娑引唎引三十一摩賀引引地怛嚩二合三十二嚩囉嚩囉娜嚩囒娜諾三十三唵引三十四摩賀引播捨三十五囉二合娑囉囉二合娑囉三十六阿上三麼三麼引難上多娑莫三十七三滿多跋捺囉二合三十八三滿多遜娜囉三十九三滿多引迦囉四十三滿多囉二合娑𠸪四十一娑囉娑囉四十二係係滿祖嚩囉娜嚩日囉二合朅誐四十三親上娜親上娜四十四牝娜牝娜四十五尾囉惹尾囉惹四十六羯􅝝磨引跛誐麼迦四十七素佉娜娜四十八矩嚕矩嚕四十九度嚕度嚕五十素嚕素嚕五十一馱馱馱馱五十二摩賀引摩賀五十三謨賀也謨賀也五十四抱引抱引五十五鼻麼鼻麼五十六曩娜曩娜五十七娑囉娑囉五十八摩賀引怛嚩二合謨左也𤚥引五十九麼曩引他六十麼努悉㗚二合惹跢引播引野六十一耨佉蘇騫上娜娜六十二摩賀引迦引嚕迦六十三阿上曩引兔引憾六十四耨企妬憾六十五娑嚕乳憾六十六塢跛訥嚕二合妬引憾六十七阿上尾尾䓛妬二合引憾六十八矩枲星異反引怒憾六十九娑囉拏達謨憾七十怛挽二合婆去誐挽七十一耨企跢引南上七十二素騫上娜娜七十三阿上曩引他引南上七十四娑曩引他迦囉七十五娑囉惹引南上七十六尾囉惹塞迦二合囉七十七塢跛訥嚕二合跢引南上七十八􅞫引捺囉二合嚩耨佉捨麼迦七十九阿上尾尾訖跢二合南上八十矩捨攞達磨八十一三去婆去引囉八十二跛哩布引囉以跢八十三矩枲引娜引南上八十四味引哩也二合娜跢引八十五娑囉拏鼻達弭喃引上八十六阿上蜜㗚二合多跛娜引跢八十七麼麼引比婆去誐挽曩引兔引婆去嚩八十八捨囉赧八十九跛囉引也拏娑怛囉三合引跢引九十嚩耨佉引𩕳銘九十一陜麼也九十二嚩吉禮二合捨九十三囉惹悉銘九十四阿上跛曩也九十五嚩僧上娑引嚧引捺囉二合嚩九十六耨佉引𩕳銘九十七曩引捨也九十八矩捨攞達磨九十九跛哩布引囉喃二合銘矩嚕一百嚩羯磨引嚩囉拏一㗚嚩二合跢引𩕳銘二尾枳囉三摩賀引引地怛嚩二合四細尾多五味引哩也二合播引囉弭跢引喻儼銘六散𩕳喻惹也七阿上囉拏達磨八尾囉引誐尾囉惹九散惹賀十囉二合惹賀十一馱囉娑麼十二佉娑麼十三惹引攞𩕳地娑麼十四銘嚕娑麼十五摩賀引引地怛嚩二合十六嚩囉娜十七娑嚩二合引賀引一百十八句聖𭦟殊室利童真菩根本陀羅尼曩莫嚩怛他引哆引南上引一阿上進上底也二合阿上囉二合底賀多舍引娑曩引南上引二唵引三囉囉四娑麼二合囉五阿上囉二合底賀多舍引娑曩六矩麼引囉嚕跛馱引哩七吽引吽引八娑二合吒半音娑二合吒半音九娑嚩二合引賀引十文殊師利菩五根本陀羅尼曩莫三滿多沒馱引南上引一係係二矩麼引囉迦三尾穆訖底二合他悉體二合多四娑麼二合囉娑麼二合囉五囉二合底枳撚二合引六娑嚩二合引賀引七𭦟殊室利菩五字陀羅尼阿上囉跛左曩文殊師利於汝法中復有最勝成就六字陀羅尼唵一嚩引入計二合娜曩莫二文殊師利童真菩最勝大威德八字祕密心陀羅尼曩謨引阿上跛哩弭多引𢈔枳娘二合引曩一尾寧室左二合也囉忍自引反引捺囉二合引也怛他引跢引也二曩謨滿乳室哩二合三矩麼引囉步多引也四怛你也二合他引五唵六阿引味引囉吽引佉左𠸪七文殊師利童真菩一字明王心陀羅尼唵一叱啉二合引二文殊師利菩最勝祕密一字大明王陀羅尼曩謨𭦟乳室哩二合矩麼引囉步哆引也一唵二叱理呬淫四合呼之三文殊師利菩小心陀羅尼嚩無博反引計二合一吽引二文殊師利菩三字心陀羅尼唵引一吽引𠺁自洛反二文殊師利菩大忿怒陀羅尼唵一嚩日囉二合底引乞義拏三合引二矩嚕二合引馱三親去娜親去娜四吽引五吒半音六文殊師利菩滅一切罪陀羅尼曩謨阿引哩也二合𭦟乳室哩二合一矩麼引囉步跢引也二怛你也二合他引三惹惹四惹也臘第五惹也摩賀引麼係六摩賀引麼底七娑嚩二合引賀引八文殊師利菩寶藏陀羅尼曩謨𭦟乳室哩二合引一婆去矩麼引囉步跢也二怛你也二合他引三唵四室哩二合引陛五麼陛六阿上麼攞陛七娑麼三滿多􅝗陛八娑嚩二合引賀引九無上悉地心陀羅尼唵一三麼也二室哩二合引三吽引四娑嚩二合引賀引五隨心陀羅尼唵一阿上捨麼二吽引三娑嚩二合引賀引四文殊師利菩除一切冤𢙣怖畏陀羅尼曩莫嚩沒馱引地怛吠二合引毗藥二合一阿上囉二合底賀多舍引娑寧毗藥二合唵二賀曩賀曩三嚩婆去喻引蹉引娜也引蹉娜也四怛囉二合引娑也五謨引吒也六親去娜牝去娜七入嚩二合攞入嚩二合攞八吽引吽引九吒半吒半十娑嚩二合引賀引十一文殊師利菩聞持陀羅尼曩謨婆去誐嚩妬引一滿乳室哩二合也寫二摩賀引引地怛嚩二合寫三阿上僧去誐囉二合枳娘二合寫四摩賀迦嚕迦寫五怛你也二合他引六阿上囉薺七尾囉薺八戍引馱𩕳九尾戍引馱𩕳十沒地囉二合引馱𩕳十一悉沒㗚三合底馱引囉十二度嚕度嚕十三馱囉馱囉十四襪􅛔㗚馱二合㗚馱二合十五娑沒㗚三合底𤚥婆去嚩弭十六麼引銘娑沒㗚三合底十七囉二合拏設覩十八味引哩也二合㗚馱二合𩕳十九娑嚩二合引賀引二十請文殊師利菩及諸眷屬陀羅尼唵一係係二矩麼引囉尾濕嚩二合嚕引比三嚩嚩引攞婆去史多四囉二合引馱𩕳五阿引夜引呬矩麼引囉訖唎二合引𠯆𡰱句反􅇁答麼二合攞馱引哩六滿拏攞沫第七底瑟姹二合底瑟姹二合八三麼也麼努娑麼二合囉九阿上囉二合底賀多舍娑曩十吽引十一麼引尾攬嚩十二嚕嚕十三娑二合吒十四娑嚩二合引賀引十五文殊師利菩最勝滿願陀羅尼曩莫嚩沒馱引南上引一阿上囉二合底賀多舍引娑曩引南上引二怛你也二合他引三惹演惹也四娑嚩二合惹也五摩賀引迦引嚕迦六尾濕嚩二合嚕引比七蹉蹉八娑嚩二合婆去嚩南上引九嚩沒憚引室左二合尾􅗭㗚惹二合也十颯跛哩嚩𫬠十一娑嚩二合婆去嚩難上左十二阿上努囉二合吠引捨也十三三麼也麼努娑麼二合囉十四嚩遏㗚他二合引室左二合銘十五悉殿覩滿怛囉二合跛諾十六麼努引囉探銘十七跛哩布引囉也十八娑嚩二合引賀引十九文殊師利菩聞持陀羅尼曩謨􅇡納謨二合引多囉囉引惹引也一怛他引多夜引囉曷二合帝三𦴭三沒馱引也二曩謨納麼二合尾𢈔二合賀引也怛他引跢引也引三曩謨枳娘二合曩麼多怛他引跢引也四曩莫阿引哩也二合滿乳室哩二合夜引也五引地怛嚩二合引也六帝毗喻二合引曩莫塞訖㗚三合怛嚩二合引七伊上𤚥尾你也二合引囉二合嚩入乞義也三合引弭八怛你也二合他引九納銘二合納麼二合叄婆去吠十納謨二合引多𭋸十一摩賀引句捨引攞十二尾舍引攞沒第十三嚩怛他引多囉賀細二合十四娑嚩二合引賀引十五文殊師利菩滅罪陀羅尼曩謨阿引哩也二合𭦟殊室哩二合引夜引也一引地怛嚩二合引也二怛你也二合他引三滿寧二合滿寧二合四滿寧𢈔二合跛哩戍引馱寧五娑嚩二合引賀引六文殊師利菩縛賊陀羅尼曩謨滿乳室哩二合一矩麼引囉步跢引也二怛你也二合他引三呬哩底瑟姹二合四怛塞迦二合囉五襪無反􅛜度引枲六麼引左攞七娑嚩二合引賀引八文殊師利菩乞警誡陀羅尼怛你也二合他引一唵引二係係三婆去誐麼護嚕引跛馱囉四你尾也二合作娑曬五阿上嚩路迦也六阿上嚩路迦也𤚥七三麼也麼努娑麼二合囉八矩麼引囉嚕跛馱引哩引九摩賀引引地怛嚩二合十緊唧囉引也枲十一吽短呼十二娑二合吒半音十三娑嚩二合引賀引十四𭦟殊室利菩速疾應驗陀羅尼曩莫三滿多沒馱引南上引一阿上進上底也二合納婆去二合步多引嚕比喃引上二怛你也二合他引三唵引四尾濕吠二合尾濕嚩二合三婆吠引五尾濕嚩二合嚕引比六迦賀迦賀七阿上引尾捨阿去引尾捨八三麼也麼努娑麼二合囉九嚕嚕十底瑟姹二合十一娑嚩二合引賀引十二文殊師利菩加持菩提莊嚴成就陀羅尼曩莫𭦟乳室哩二合夜引也一矩麼引囉步跢引也二怛你也二合他引三惹尾惹四惹室哩二合引五乳自祿反瑟致上二合六吽引七娑嚩二合引賀引八文殊師利菩五種五字真言阿上囉跛左曩一唵嚩日囉二合底引乞義拏三合二唵耨佉砌娜三唵朅誐屹囉二合欠四唵朅祛反諸同誐怛嚩二合五六種六字真言唵嚩入計二合娜曩莫一唵嚩引入計二合􅛂㗚剃二合惹也二唵嚩引入計二合勢灑娑嚩二合三唵嚩引入計二合騫上惹也四唵嚩引入計二合𩕳瑟蠆二合也五唵嚩引入計二合麼曩娑六文殊