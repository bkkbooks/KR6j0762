body:
  text: 上都大安國寺傳密教超悟大師賜紫三藏沙門行琳集大般若波羅蜜多陀羅尼大般若佛母聞持陀羅尼般若大心陀羅尼能斷金剛般若陀羅尼頂輪經般若陀羅尼般若無盡藏陀羅尼般若聞持陀羅尼仁王般若陀羅尼十波羅蜜菩陀羅尼十道佛母虛空眼陀羅尼悲生佛眼陀羅尼大金剛吉祥佛眼陀羅尼吉祥佛眼心陀羅尼七俱胝佛母陀羅尼七俱胝準提大身陀羅尼佛母大孔雀明王身陀羅尼佛母大孔雀明王祕密心陀羅尼佛母大孔雀明王普成就陀羅尼佛母大孔雀明王大心陀羅尼大孔雀明王結界縛魔陀羅尼無染著佛母陀羅尼金勝佛母陀羅尼大般若波羅蜜多陀羅尼曩謨引婆去誐嚩底二合一囉二合枳娘二合播引囉弭多二薄訖底二合襪攃攞引三阿上跛哩弭多麌拏引四嚩怛他引多跛哩布爾跢引五嚩怛他引跢引努枳娘二合多努枳娘二合多尾枳娘二合引多引六怛你也二合他引七囉二合枳下尼制反二合囉二合枳二合八摩賀引囉二合枳二合九囉二合枳娘二合引婆去引娑迦𭋸十囉二合枳娘二合路迦羯𭋸十一頞馱迦引囉尾馱麼寧十二悉第蘇悉第十三悉殿覩𤚥引十四婆去誐嚩底十五􅞣𠕀無肯反誐遜娜𭋸十六薄訖底二合襪攃𥠖十七囉二合娑引哩多曷悉帝二合十八叄麼濕嚩二合引娑迦𭋸十九沒𠆙沒𠆙二十悉𠆙悉𠆙二十一劒跛劒跛二十二入嚩二合攞入嚩二合攞二十三左攞左攞二十四囉引嚩囉引嚩二十五阿引蹉阿引蹉二十六婆去誐嚩底二十七麼引尾攬嚩二十八娑嚩二合引賀引二十九般若聞持陀羅尼曩謨引婆去誐嚩底二合一囉二合枳娘二合播引囉弭多引二怛你也二合他引三母𩕳達謎四僧去屹囉二合賀達謎五阿上努屹囉二合賀達謎六尾穆訖底二合達謎七娑娜引努屹囉二合賀達謎八吠室囉二合麼拏達謎九三麼多努跛哩襪㗚多二合曩達謎十麌拏僧去屹囉二合賀達謎十一嚩迦引攞跛哩播引攞拏達謎十二娑嚩二合引賀引十三般若大心陀羅尼曩謨引婆去誐嚩底二合一囉二合枳娘二合播囉弭多二怛你也二合他引三帝帝四播囉帝五播引囉僧去帝六引地七娑嚩二合引賀引八能斷金剛般若陀羅尼曩謨引曩底二合曩一婆去誐嚩底二囉二合枳娘二合播囉弭多三娑普二合吒引四親去娜嚩日哩二合作訖𭋸二合拏五帝曩底二合曩六播跛劒七怛你也二合他引八唵九地引入十秫嚕二合底十一娑沒㗚三合底十二尾惹十三娑嚩二合引賀引十四頂輪經中所説般若陀羅尼曩莫三滿多沒馱引南上引一唵引二秫嚕二合底三娑沒㗚三合底四尾惹五娑嚩二合引賀引六般若無盡藏陀羅尼曩謨引婆去誐嚩底二合一囉二合枳娘二合播囉弭多二唵引三紇㗚二合引入地引入四室唎二合引秫嚕二合底五尾惹六娑嚩二合引賀引七般若波羅蜜多聞持不忘陀羅𡰱曩謨引婆去誐嚩底二合一囉二合枳娘二合播囉弭多二怛你也二合他引三室哩二合四室哩二合五室哩二合六室哩二合野細七娑嚩二合引賀引八仁王般若波羅蜜多陀羅尼曩謨引喇怛曩二合怛囉二合夜引野一曩莫阿去引哩野二合吠嚧引左曩引也怛他引跢引夜引二囉曷二合帝三𦴭三沒馱引也三曩莫阿去引哩也二合三滿多跋捺囉二合引也四冒引地怛嚩二合引也五摩賀引怛嚩二合引也六摩賀引迦引嚕迦引也七怛你也二合他引八枳娘二合曩囉二合你泥邑反引閇九𢙣乞義二合也句勢十囉二合底婆去曩嚩底十一嚩沒馱引嚩路枳帝十二諭誐跛哩𩕳澀半二合寧十三儼鼻引囉努囉嚩誐係十四底哩二合拽特嚩二合跛哩𩕳澀半二合寧十五引地唧多十六散惹曩𩕳十七􅞣嚩鼻曬迦引鼻色訖帝二合十八達磨娑引誐囉三步帝十九阿上謨引伽去引室囉二合嚩二十摩賀引三滿多跋捺囉二合步弭捏寧吉反哩也二合帝二十一尾也二合引迦囉拏跛哩囉二合跛二十二嚩悉馱曩莫塞訖㗚三合帝二十三嚩引地怛嚩二合散惹曩𩕳二十四婆去誐嚩底丁逸反沒馱麼引帝二十五阿上囉二十六迦囉二十七阿上囉拏二十八迦囉二十九摩賀引囉二合枳娘二合三十播引囉弭帝三十一娑嚩二合引賀引三十二布施波羅蜜菩陀羅尼唵一婆去誐嚩底二娜引曩引地跛帝三尾悉㗚二合惹引布引囉也娜引南四娑嚩二合引賀引五戒波羅蜜菩陀羅尼唵一試引攞馱引哩二婆去誐嚩底三吽引郝四忍辱波羅蜜菩陀羅尼唵一婆去誐嚩底二乞鏟二合引底馱引哩三吽引吒半音四精進波羅蜜菩陀羅尼唵一尾微一反引哩也二合迦哩二吽引三尾哩二合尾哩二合四娑嚩二合引賀引五禪波羅蜜菩陀羅尼唵一婆去誐嚩底二嚩播引跛賀哩三摩賀引奈引底二合四吽引吽引吽引五吒半音六般若波羅蜜菩陀羅尼唵一地引二室哩二合引輸嚕二合多尾惹三娑嚩二合引賀引四方便波羅蜜菩陀羅尼唵一摩賀引每引怛囉二合唧帝二娑嚩二合引賀引三願波羅蜜菩陀羅尼唵一迦嚕尼貞反迦嚕二賀賀賀三糝四力波羅蜜菩陀羅尼唵一娜麼𩕳母你帝二吽引三賀賀賀四吽引弱五智波羅蜜菩陀羅尼唵一麼麼枳娘二合引曩迦哩二吽引三娑嚩二合引賀引四佛母虛空眼陀羅尼曩莫三滿多沒馱引南上引一誐誐曩嚩囉落乞義二合二誐誐曩三銘三嚩妬娜二合多阿上鼻娑引囉三去婆去吠四入嚩二合攞曩莫阿上謨伽去南上五娑嚩二合引賀引六悲生佛眼陀羅尼曩莫三滿多沒馱引南上引一誐誐曩嚩囉落乞義二合二迦引嚕拏引麼也三怛他去跢引作屈二合入四娑嚩二合引賀引五大金剛吉祥佛眼陀羅尼曩謨引婆去誐嚩妬引瑟二合引灑引也一唵引二嚕嚕三娑普二合嚕四入嚩二合攞五底瑟姹二合六悉馱路左𩕳七􅞤