body:
  text: 上都大安國寺傳密教超悟大師賜紫三藏沙門行琳集輪王佛頂一字陀羅尼一切如來部母佛眼陀羅尼大白傘蓋佛頂陀羅尼光聚佛頂陀羅尼高佛頂王陀羅尼勝佛頂王陀羅尼辦事佛頂陀羅尼摧壞佛頂陀羅尼摧毀佛頂陀羅尼無能勝佛頂陀羅尼遍照佛頂陀羅尼輪王佛頂心陀羅尼輪王佛頂隨心陀羅尼如來陀羅尼佛眼陀羅尼明印輪王佛頂祈雨陀羅尼輪王佛頂止雨陀羅尼輪王佛頂止𢙣風雨雹陀羅尼光聚佛頂止雨陀羅尼無比力超勝世出世真言上一切佛頂主輪王佛頂一字陀羅尼輪王佛頂一字陀羅尼曩莫三滿多沒馱引南上引一步嚕唵三合引二一切如來部母佛眼陀羅尼曩莫􅞣嚩怛他引帝毗喻二合引一􅟓囉曷二合毗藥二合二三去𦴭三去沒第毗藥二合三唵四嚕嚕五塞普二合嚕六入嚩二合攞七底瑟姹二合八悉馱路左𩕳九􅞣嚩遏􅚼㗚他二合娑去馱寧十􅁤娑嚩二合引賀引十一白傘蓋佛頂陀羅尼曩莫三滿多沒馱引南上引一唵引二怛他去妬引瑟抳二合引灑三阿上曩嚩路枳多母引㗚馱曩三合四唵引五麼麼麼麼六吽引七匿你翼反八光聚佛頂王陀羅尼曩莫三滿多沒馱引南上引一唵引二怛他去妬引瑟二合引灑三阿上曩嚩路枳帝四母引􅛔㗚馱二合五帝乳自魯反囉始六唵七入嚩二合攞入嚩二合攞八馱迦馱迦九尾馱迦尾馱迦十娜囉娜囉十一尾娜囉尾娜囉十二親去娜親去娜十三牝娜牝娜十四吽引吽引十五泮吒半音呼下皆同泮吒十六娑嚩二合引賀引十七高佛頂王陀羅尼曩莫三滿多沒馱引南上引一唵引二入嚩二合攞入嚩二合攞三你比野二合你比野二合四你比𢈔二合娜二合妬引瑟二合引灑五度曩度曩六吽引七勝佛頂王陀羅尼曩莫三滿多沒馱引南上引一唵引二入嚩二合攞惹諭瑟二合引灑三入嚩二合攞入嚩二合攞四滿馱滿馱五娜麼娜麼六訥嚕唵三合訥嚕唵三合訥嚕唵三合七郝賀曩八吽引九辦事佛頂陀羅尼曩謨婆去誐嚩妬引瑟二合引灑引野一唵引二吒嚕唵三合引滿馱三婆嚩二合引賀引四摧壞佛頂陀羅尼曩謨婆去誐嚩妬引瑟二合引灑引野一唵二尾枳囉拏三度曩度曩四讀引五摧毀佛頂陀羅尼曩謨引婆去誐嚩妬引瑟二合引灑引野一嚩尾􅍕近曩二合二尾特二合娑曩迦囉引野三吒嚕二合引吒野四娑嚩二合引賀引五無能勝佛頂陀羅尼曩謨婆去誐嚩妬引瑟抳二合引灑引野一嚩怛囉二合阿上跛囉引爾跢引野二唵引三奢麼野奢麼野四扇引諦難上引諦五達磨囉引惹婆去史諦六摩賀引尾你野二合七􅞣嚩遏􅚼㗚他二合娑去馱寧八娑嚩二合引賀引九遍照佛頂陀羅尼曩莫三滿多沒馱引南上引一噁引莫㟏二輪王佛頂心陀羅尼曩莫三滿多沒馱引南上引一阿上囉二合底賀多二舍娑曩引南上引三唵引四怛他引妬引瑟二合引灑五阿上曩嚩路枳多母引㗚馱寧三合六斫羯囉二合襪㗚底二合七吽引八入嚩二合攞入嚩二合攞九馱迦馱迦十度曩尾度曩十一怛囉二合引娑野十二麼引攞喻瑳娜野十三賀曩賀曩十四伴惹伴惹十五暗暗十六𢙣𢙣十七腳腳十八補𭍌二合企𩕳補𭍌二合企𩕳十九軍上拏理𩕳二十阿上跛囉引爾多二十一娑怛囉三合馱哩抳二十二吽引吽引二十三癹吒半音癹吒二十四娑嚩二合引賀引二十五輪王佛頂隨心陀羅尼曩莫三滿多沒馱引南上引一阿上囉二合底賀多二舍娑曩引南上引三唵引四阿上跛囉引爾多五特地翼反六如來陀羅尼曩莫三滿多沒馱引南上引一唵引二路迦播攞遏地瑟恥二合多三馱𭋸馱囉野四摩賀引努婆去嚩五沒馱怛囉二合六娑嚩二合引賀引七佛眼陀羅尼明印二手密合掌次屈二風頭各安於火背二空屈入掌名為佛眼印輪王佛頂祈雨陀羅尼曩莫三滿多沒馱引南上引一唵引二勃嚕唵三合引三嚩曩引誐引襪􅞻㗚鏟二合覩去嚩引四室左二合三滿帝曩五娑嚩二合引賀引六輪王佛頂止雨陀羅尼曩莫三滿多沒馱引南上引一唵引二勃嚕唵三合引三拶咄􅛈諾屈二合曩引誐引南上引四囉二合尾扇引覩五阿上􅋎悉泯二合禁俱滲反陛六嚩訥瑟吒二合曩引誐引喃上引七𡃝梨衮反馱弭八娑嚩二合引賀引九輪王佛頂止非時𢙣風雨雹陀羅尼散𡃝同上馱弭一嚩引蘇枳引囉二合蘇佉引曩引誐引囉引惹引努引二麼努史夜二合引南上引三散悉焰二合尾係姹演底四曩莫三滿多沒馱引南上引五勃嚕唵三合引六拶咄溺屈二合曩引誐引南上引七囉二合尾捨八阿上悉泯二合禁同上陛九嚩訥瑟吒二合曩引誐引南上引十𠷈梨骨反馱弭十一娑嚩二合引賀引十二光聚佛頂燒萎花白芥子止雨陀羅尼曩莫三滿多沒馱引南上引一阿上囉二合底賀多二舍引娑曩引南上引三唵四怛他引妬引瑟抳二合引灑五阿上曩嚩路枳多母引㗚馱二合六帝乳囉始七吽引八入嚩二合攞入嚩二合攞九鐸迦鐸迦十尾鐸迦尾鐸迦十一娜囉娜囉十二尾娜囉尾娜囉十三親去娜親去娜十四牝娜牝娜十五吽引吽引十六嚩訥瑟吒二合曩引誐襪㗚灑二合引娑擔二合婆去野十七娑二合吒半娑二合吒半十八娑嚩二合引賀引十九維皇統六年嵗次丙寅十二月丙申朔五日庚子辰時造
