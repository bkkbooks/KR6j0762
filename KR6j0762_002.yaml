body:
  text: 上都大安國寺傳密教超悟大師賜紫三藏沙門行琳集大佛頂陁羅尼大佛頂心陁羅尼亦名小佛頂大勝金剛頂真實大三昧耶陁羅尼熾盛光佛頂陁羅尼大力佛頂陁羅尼一切如來金剛最勝王義利堅固愛染王陁羅尼大佛頂如來廣放光明聚現大白傘盖遍覆三千界摩訶悉怛多怛囉金剛無㝵大道塲最勝無比大威德金輪帝祖仁祖反囉施都攝一切大明王揔集不可說百千旋陁羅尼十方如來清淨海眼微妙秘密大陁羅尼三藏不空譯曩莫嚩沒䭾引地怛吠微閇反二合引毗藥二合一曩莫颯跢引南上引二三去𦴭三去沒䭾三句引致引南上引四室囉二合嚩迦僧去伽去南上引五曩謨路引計􅟓囉曷二合擔引六曩莫素嚕二合跢引半曩引南上引七曩莫塞訖㗚二合娜引誐引弭南上引八曩莫阿上曩引誐弭南上引九曩謨路引計三去𦴭跢引南上引十三𦴭囉二合底丁以反半曩引南上引十一曩謨引去嚩􅞽㗚史二合喃上引十二曩莫悉馱尾你也二合引䭾引囉􅞽㗚史二合喃上引十三舍引播引弩鼻音屹囉二合賀娑上沫􅚼㗚他二合南上引十四曩謨引沒囉二合􅋘憾麼二合鼻引十五曩莫引印捺囉二合野十六曩謨引婆去誐嚩帝引十七嚕捺囉二合引野十八塢麼底准上娑上呬馨異反引夜引野十九曩謨曩引囉演拏鼻音野二十落􅋤乞讖弭三合二十一半左摩賀引母捺囉二合引二十二曩莫塞訖㗚三合跢野二十三曩謨引婆去誐嚩帝二十四摩賀引迦攞引野二十五底哩二合補囉曩誐囉二十六尾捺囉二合跛拏迦囉引野二十七阿上地穆訖得二合迦􅊴濕麼二合舍引曩嚩枲星以反寧引二十八麼底哩二合誐拏鼻音二十九曩莫塞訖㗚三合跢野三十曩謨引婆去誐嚩帝三十一怛他去引跢矩攞引野三十二曩謨引婆去誐嚩帝三十三納麼二合矩攞引野三十四曩謨引婆去誐嚩帝三十五嚩日囉二合矩攞野三十六曩謨引婆去誐嚩帝三十七麼尼整反矩攞野三十八曩謨引婆去誐嚩帝三十九惹自攞反矩攞引野四十曩謨引婆去誐嚩帝四十一你哩二合茶去戍引囉細引曩囉二合賀囉拏鼻囉引惹准上野四十二怛他引跢引野引囉曷二合帝四十三三去𦴭三沒䭾引野四十四曩謨婆去誐嚩帝四十五阿上弭跢引婆去引野四十六怛他去引跢引野引囉曷二合帝四十七三去藐三去沒䭾引野四十八曩謨婆去誐嚩帝四十九𢙣屈二合毗夜二合引野五十怛他引跢引夜引囉曷二合帝五十一三去𦴭三去沒䭾引野五十二曩謨婆去誐嚩帝五十三佩𭣱尒野二合麌遇縷反嚕吠微閇反引𠯆尼古反哩野二合囉二合婆去囉引惹引野五十四怛他引跢引夜引囉曷二合帝五十五三去藐三去沒䭾引野五十六曩謨婆去誐嚩帝五十七三去補澁畢二合多上娑上隣上捺囉二合囉引惹引野五十八怛他去跢引夜引囉曷二合帝五十九三去𦴭三去沒䭾引野六十曩謨引婆去誐嚩帝六十一舍引枳野二合母曩引六十二怛他引跢引夜引囉曷二合帝六十三三去𦴭三去沒䭾引野六十四曩謨引婆去誐嚩帝六十五喇怛曩二合矩素麼計引覩囉引惹引野六十六怛他引跢引夜引囉曷二合帝六十七三去𦴭三去沒䭾引野六十八帝釤曩莫塞訖㗚三合怛嚩二合六十九伊上𤚥引婆去誐嚩多娑怛二合他去引妬引瑟二合引釤七十悉跢多怛𫬠二合七十一曩麼引跛囉引尒自以反擔七十二囉二合底孕二合儗霓以反𫬠引七十三嚩部多屹囉二合賀𩕳屹囉二合賀迦囉滛二合引七十四跛囉尾你也二合引砌娜𩕳寅二合引七十五阿上迦引藍沒㗚二合底𢈔二合跛哩怛囉二合引拏迦哩寅二合引七十六嚩滿䭾曩謨乞灑二合滛二合七十七嚩訥瑟吒二合耨娑嚩二合曩二合𩕳嚩引囉滛二合引七十八拶覩囉試引底引南上引七十九屹囉二合賀娑賀娑囉二合𭊥引八十尾特吻二合娑曩迦哩寅二合引八十一阿上瑟吒二合引尾孕二合設底難上八十二諾乞剎二合怛囉二合引喃引八十三囉二合娑引娜曩迦哩寅二合引八十四阿上瑟吒二合難上引摩賀引屹囉二合賀𭊥八十五尾特吻二合娑曩迦哩寅二合引八十六嚩設咄嚕二合𩕳嚩囉滛二合引八十七具𫬠耨娑嚩二合曩二合難上左曩引設𩕳滛二合八十八尾灑設娑怛囉三合阿上􅍋儗𩕳二合嗢跢囉滛二合八十九阿上跛囉引尒擔摩賀引具引𫬠引九十摩賀引麼攬引九十一摩賀引賛喃上引九十二摩賀引捻奴揖反擔二合九十三摩賀引帝引染自攬反九十四摩賀引濕吠二合擔引九十五摩賀引入嚩二合攬九十六摩賀引麼攞引九十七半拏囉嚩引枲𩕳引九十八阿去引哩野二合跢囉引九十九勃哩二合矩砧去引一百載嚩尾惹野一嚩日囉二合麼礼底尾秫嚕二合擔二納𢅴上二合劒三嚩日囉二合尒賀嚩二合左四麼引攞引載引嚩引跛囉引尒多五嚩日囉二合引難上膩寅二合六尾舍引攞引左扇跢吠七去嚩布引尒擔引八掃去引弭野二合嚕引喯補敢反九摩賀引濕吠二合跢引十阿去引哩野二合跢引囉十一摩賀引麼攞十二阿上跛囉引嚩日囉二合餉迦攞引載嚩十三嚩日囉二合矯魚矯反引麼鼻引哩矩嬾䭾哩引十四嚩日囉二合賀娑跢二合引左十五摩賀引尾你野二合引十六謇左曩麼鼻引理迦引十七矩遜蘇㵕反婆去引喇怛曩二合載嚩十八吠引嚧轉舌左曩引十九矩剌引􅚼闥難上鄔瑟二合引灑二十尾日啉二合婆去麼拏引左二十一娑嚩日囉二合迦曩迦二十二囉二合婆去路引左曩二十三嚩日囉二合引膩寅二合左二十四濕吠二合跢引左二十五迦麼鼻攞引乞史二合引二十六設試囉二合婆去蒲憾反伊上底二合帝二十七母捺囉二合引誐拏引二十八吠引囉乞鏟二合䓛俱律反􅞣㗚挽二合下無滿反